function shuffleArr(a){const r=[…a];for(let i=r.length-1;i>0;i–){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function fmt(s){return Math.floor(s/60)+”:”+String(s%60).padStart(2,“0”);}
function doScramble(w){const a=w.split(””);for(let i=a.length-1;i>0;i–){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a.join(””)===w?doScramble(w):a.join(””);}

function useAmbientSound(){
const ctxRef=useRef(null),nodesRef=useRef([]),onRef=useRef(false),loopRef=useRef(null);
const start=useCallback(()=>{
if(onRef.current)return;
try{
if(!ctxRef.current)ctxRef.current=new(window.AudioContext||window.webkitAudioContext)();
const ac=ctxRef.current;
if(ac.state===“suspended”)ac.resume();
const master=ac.createGain();master.gain.value=0.18;master.connect(ac.destination);
nodesRef.current=[master];onRef.current=true;
const notes=[523.25,659.25,783.99,1046.5,783.99,659.25,523.25,392.00];
const bass=[130.81,164.81,130.81,196.00];
const tempo=0.18;let step=0,bstep=0;
const playNote=(freq,t,dur,vol,type)=>{
const o=ac.createOscillator(),g=ac.createGain(),lp=ac.createBiquadFilter();
lp.type=“lowpass”;lp.frequency.value=1800;o.type=type||“square”;o.frequency.value=freq;
g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.01);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
o.connect(lp);lp.connect(g);g.connect(master);o.start(t);o.stop(t+dur+0.05);
};
const tick=()=>{
if(!onRef.current)return;
const now=ac.currentTime;
playNote(notes[step%notes.length],now,tempo*0.75,0.10,“square”);
if(step%4===0){playNote(bass[bstep%bass.length],now,tempo*1.8,0.08,“triangle”);bstep++;}
const c=ac.createOscillator(),cg=ac.createGain();
c.frequency.value=step%2===0?900:600;c.type=“sine”;
cg.gain.setValueAtTime(0.06,now);cg.gain.exponentialRampToValueAtTime(0.001,now+0.04);
c.connect(cg);cg.connect(master);c.start(now);c.stop(now+0.05);
step++;loopRef.current=setTimeout(tick,tempo*1000);
};
tick();
}catch(e){}
},[]);
const stop=useCallback(()=>{
if(!onRef.current)return;
try{clearTimeout(loopRef.current);nodesRef.current.forEach(n=>{try{n.disconnect();}catch(e){}});nodesRef.current=[];onRef.current=false;}catch(e){}
},[]);
return{start,stop};
}

  const keyUp   = (e) => { keys[e.key] = false; };
  window.addEventListener("keydown", keyDown);
  window.addEventListener("keyup", keyUp);

  carGameRef.current = {
    moveLeft:  () => { keys["ArrowLeft"] = true; },
    moveRight: () => { keys["ArrowRight"] = true; },
    stopLeft:  () => { keys["ArrowLeft"] = false; },
    stopRight: () => { keys["ArrowRight"] = false; },
    word, getCollected: () => collected,
  };

  const drawCar = (x, y, slowed) => {
    // Body
    ctx.fillStyle = slowed ? "#f87171" : "#60a5fa";
    ctx.beginPath();
    ctx.roundRect(x - car.w/2, y - car.h/2, car.w, car.h, 8);
    ctx.fill();
    // Windshield
    ctx.fillStyle = "rgba(255,255,255,0.25)";
    ctx.fillRect(x - 14, y - 26, 28, 18);
    // Wheels
    ctx.fillStyle = "#1a1a2e";
    [[-1,1],[1,1],[-1,-1],[1,-1]].forEach(([dx,dy]) => {
      ctx.beginPath();
      ctx.ellipse(x + dx*(car.w/2 - 2), y + dy*(car.h/2 - 8), 7, 10, 0, 0, Math.PI*2);
      ctx.fill();
    });
    // GenLayer logo on car
    ctx.fillStyle = "#facc15";
    ctx.font = "bold 9px 'Fredoka One', cursive";
    ctx.textAlign = "center";
    ctx.fillText("GL", x, y + 6);
  };

  const loop = () => {
    if (done) return;
    ctx.clearRect(0, 0, W, H);

    // Road
    ctx.fillStyle = "#1a1a2e";
    ctx.fillRect(0, 0, W, H);

    // Road edges
    ctx.fillStyle = "#facc15";
    ctx.fillRect(18, 0, 6, H);
    ctx.fillRect(W - 24, 0, 6, H);

    // Scrolling center stripes
    stripes.forEach(s => {
      s.y += speed * 2.5;
      if (s.y > H + 20) s.y -= (H + 40);
      ctx.fillStyle = "rgba(255,255,255,0.15)";
      ctx.fillRect(W/2 - 3, s.y, 6, H/6);
    });

    // Move car
    const slowed = slowTimer > 0;
    if (slowed) slowTimer--;
    const spd = slowed ? car.speed * 0.4 : car.speed;
    if ((keys["ArrowLeft"] || keys["a"] || keys["A"]) && car.x > 40) car.x -= spd;
    if ((keys["ArrowRight"] || keys["d"] || keys["D"]) && car.x < W - 40) car.x += spd;

    // Spawn letters
    spawnTimer++;
    if (spawnTimer > 55) { spawnTimer = 0; spawnLetter(); }

    // Update + draw letters
    for (let i = letterObjs.length - 1; i >= 0; i--) {
      const l = letterObjs[i];
      l.y += l.speed * (speed / 2);

      // Hit detection
      const dx = Math.abs(car.x - l.x);
      const dy = Math.abs((car.y) - l.y);
      if (dx < car.w/2 + l.r - 6 && dy < car.h/2 + l.r - 8) {
        if (l.correct) {
          const nextIdx = collected.length;
          if (nextIdx < word.length && word[nextIdx] === l.char) {
            collected += l.char;
            score += 10;
            const ni = needed.indexOf(l.char);
            if (ni >= 0) needed.splice(ni, 1);
            // Big speed boost — very noticeable each correct letter
            speed = Math.min(14, speed + 2.5);
            car.speed = Math.min(14, car.speed + 1.5);
          }
        } else {
          // Hit red — reset ALL collected progress + speed back to base
          if (collected.length > 0) {
            collected = "";
            needed.length = 0;
            needed.push(...word.split(""));
            speed = 2;
            car.speed = 5;
          }
          slowTimer = 90;
        }
        letterObjs.splice(i, 1);
        continue;
      }

      if (l.y > H + 30) { letterObjs.splice(i, 1); continue; }

      // Draw letter bubble — fast reds bigger, slow reds smaller
      const displayR = l.isFastRed ? l.r + 5 : l.isSlowRed ? l.r - 5 : l.r;
      ctx.beginPath();
      ctx.arc(l.x, l.y, displayR, 0, Math.PI * 2);
      ctx.fillStyle = l.correct ? "rgba(74,222,128,0.18)" : "rgba(248,113,113,0.18)";
      ctx.fill();
      ctx.strokeStyle = l.correct ? "#4ade80" : l.isFastRed ? "#ff0000" : l.isSlowRed ? "#ff8888" : "#f87171";
      ctx.lineWidth = l.isFastRed ? 3 : 2;
      ctx.stroke();
      ctx.fillStyle = l.correct ? "#4ade80" : "#f87171";
      ctx.font = `bold ${l.isFastRed ? 17 : 14}px 'Fredoka One', cursive`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(l.char, l.x, l.y);
      // Speed indicator on fast/slow reds
      if (l.isFastRed) {
        ctx.font = "9px sans-serif";
        ctx.fillStyle = "#ff4444";
        ctx.fillText("⚡", l.x + displayR - 4, l.y - displayR + 4);
      } else if (l.isSlowRed) {
        ctx.font = "9px sans-serif";
        ctx.fillStyle = "#ff8888";
        ctx.fillText("🐌", l.x + displayR - 4, l.y - displayR + 4);
      }
    }

    drawCar(car.x, car.y, slowed);

    // HUD — word progress
    const boxW = W - 32;
    ctx.fillStyle = "rgba(0,0,0,0.55)";
    ctx.beginPath();
    ctx.roundRect(16, 12, boxW, 44, 10);
    ctx.fill();

    const charW = Math.min(28, (boxW - 20) / word.length);
    const startX = W/2 - (word.length * charW) / 2;
    word.split("").forEach((ch, i) => {
      const got = i < collected.length;
      ctx.fillStyle = got ? "#4ade80" : "rgba(255,255,255,0.2)";
      ctx.font = `bold ${Math.min(18, charW - 4)}px 'Fredoka One', cursive`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(ch, startX + i * charW + charW/2, 34);
      if (!got) {
        ctx.strokeStyle = "rgba(255,255,255,0.15)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(startX + i * charW + 4, 48);
        ctx.lineTo(startX + (i+1) * charW - 4, 48);
        ctx.stroke();
      }
    });

    // Slow penalty indicator
    if (slowed) {
      ctx.fillStyle = "#f87171";
      ctx.font = "bold 13px 'Fredoka One', cursive";
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      ctx.fillText("⚠ SLOWED! Progress reset!", W/2, H - 30);
    } else {
      // Show speed level
      const bars = Math.min(8, Math.floor((speed - 2) / 1.5));
      ctx.fillStyle = "rgba(0,0,0,0.4)";
      ctx.fillRect(W - 70, H - 28, 60, 16);
      for(let b = 0; b < 8; b++){
        ctx.fillStyle = b < bars ? (bars > 5 ? "#f87171" : bars > 3 ? "#facc15" : "#4ade80") : "rgba(255,255,255,0.1)";
        ctx.fillRect(W - 68 + b * 7, H - 26, 5, 12);
      }
      ctx.fillStyle = "rgba(255,255,255,0.5)";
      ctx.font = "9px sans-serif";
      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      ctx.fillText("SPD", W - 68, H - 36);
    }

    // Win check
    if (collected === word) {
      done = true;
      window.removeEventListener("keydown", keyDown);
      window.removeEventListener("keyup", keyUp);
      cancelAnimationFrame(carAnimRef.current);
      setTimeout(() => { setCarScr("win"); carGameRef.current.finalScore = score; carGameRef.current.finalWord = word; }, 600);
      return;
    }

    carAnimRef.current = requestAnimationFrame(loop);
  };

  loop();
}, 200);

            })}

          <button onClick={()=>setQScr("setup")} style={btnG}>Change Difficulty</button>
          <button onClick={()=>setScreen("menu")} style={btnG}>← Menu</button>
        </div>
      )}
    </div>
  )}

  {/* ── MEMORY ── */}
  {screen==="memory"&&(
    <div style={ctr}>
      {mScr==="setup"&&(
        <div style={card}>
          <div style={{fontFamily:"'Fredoka One',cursive",fontSize:24,color:"#fb923c",textAlign:"center",marginBottom:4}}>🃏 Memory Match</div>

            {[[3,"4×3 · 6 pairs"],[4,"4×4 · 8 pairs"]].map(([g,label])=>(
              <button key={g} onClick={()=>setMGrid(g)} style={{flex:1,padding:"12px 8px",borderRadius:12,cursor:"pointer",fontFamily:"'Fredoka One',cursive",fontSize:15,border:`2px solid ${mGrid===g?"#fb923c":"rgba(255,255,255,0.07)"}`,background:mGrid===g?"rgba(251,146,60,0.1)":"rgba(255,255,255,0.02)",color:mGrid===g?"#fb923c":"#666",lineHeight:1.3}}>
                {label.split("·")[0]}<br/><span style={{fontSize:10,opacity:0.7}}>{label.split("·")[1]}</span>

        </div>
      )}
      {mScr==="game"&&(
        <div style={{width:"100%",maxWidth:500,display:"flex",flexDirection:"column",alignItems:"center"}}>
          <div style={{display:"flex",justifyContent:"space-between",width:"100%",marginBottom:10,padding:"0 4px"}}>
            <div style={{fontFamily:"'Fredoka One',cursive",fontSize:13,color:"#555"}}>Moves: <span style={{color:"#fb923c",fontSize:17}}>{mMoves}</span></div>
            <div style={{fontFamily:"'Fredoka One',cursive",fontSize:13,color:"#555"}}>Pairs: <span style={{color:"#4ade80",fontSize:17}}>{mCards.filter(c=>c.matched).length/2}</span><span style={{color:"#333"}}>/{mCards.length/2}</span></div>
            <div style={{fontFamily:"'Fredoka One',cursive",fontSize:13,color:"#555"}}>⏱ <span style={{color:"#fb923c",fontSize:17}}>{fmt(mElapsed)}</span></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,width:"100%",maxWidth:460}}>
            {mCards.map((c,i)=>{
              const flipped=c.flipped||c.matched;
              return (
                <div key={c.uid} onClick={()=>!mLocked&&!flipped&&flipCard(i)} style={{aspectRatio:"1",borderRadius:10,cursor:flipped?"default":"pointer",position:"relative",overflow:"hidden",border:`2px solid ${c.matched?"#4ade80":flipped?"rgba(251,146,60,0.5)":"rgba(255,255,255,0.08)"}`,boxShadow:c.matched?"0 0 12px rgba(74,222,128,0.4)":"none",background:"rgba(255,255,255,0.02)",transition:"border-color 0.3s"}}>
                  {flipped ? (
                    <>
                      <img src={c.src} alt={c.label} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                      <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(0,0,0,0.55)",fontFamily:"'Fredoka One',cursive",fontSize:9,textAlign:"center",padding:"2px 0",color:"#fff"}}>{c.label}</div>
                    </>
                  ) : (
                    <div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,background:"linear-gradient(135deg,#1a1a3a,#0f0f2a)"}}>🃏</div>
                  )}
                </div>
              );
            })}
          </div>
          <div style={{display:"flex",gap:10,marginTop:14,width:"100%",maxWidth:460}}>
            <button onClick={startMemory} style={{flex:1,padding:10,borderRadius:12,background:"transparent",border:"1px solid rgba(255,255,255,0.1)",color:"#666",fontFamily:"'Fredoka One',cursive",fontSize:14,cursor:"pointer"}}>🔀 Restart</button>
            <button onClick={()=>{clearInterval(mTimerRef.current);setMScr("setup");}} style={{flex:1,padding:10,borderRadius:12,background:"transparent",border:"1px solid rgba(255,255,255,0.1)",color:"#666",fontFamily:"'Fredoka One',cursive",fontSize:14,cursor:"pointer"}}>← Setup</button>
          </div>
        </div>
      )}
      {mScr==="win"&&(
        <div style={{...card,textAlign:"center"}}>
          <div style={{fontSize:56,marginBottom:8}}>🎉</div>
          <div style={{fontFamily:"'Fredoka One',cursive",fontSize:26,color:"#fb923c",marginBottom:4}}>All Pairs Found!</div>
          <div style={{fontFamily:"'Fredoka One',cursive",fontSize:44,color:"#facc15",margin:"6px 0"}}>{mWin.time}</div>
          <div style={{color:"#555",fontSize:12,marginBottom:14}}>{mWin.moves} moves</div>
          <div style={{marginBottom:18}}><span style={{display:"inline-block",background:"linear-gradient(135deg,#fb923c,#f97316)",color:"#fff",fontFamily:"'Fredoka One',cursive",fontSize:12,padding:"3px 14px",borderRadius:99}}>{mWin.moves<=8?"🏆 Perfect":mWin.moves<=14?"⚡ Sharp":"🧩 Matched!"}</span></div>
          <button onClick={startMemory} style={btnP("linear-gradient(135deg,#fb923c,#f97316)")}>Play Again</button>
          <button onClick={()=>setMScr("setup")} style={btnG}>Change Size</button>
          <button onClick={()=>setScreen("menu")} style={btnG}>← Menu</button>
        </div>
      )}
    </div>
  )}

  {/* ── WORD SCRAMBLE ── */}
  {screen==="scramble"&&(
    <div style={ctr}>
      {wsScr==="game"&&wsCurrentWord&&(
        <div style={{width:"100%",maxWidth:460,display:"flex",flexDirection:"column",alignItems:"center"}}>
          <div style={{display:"flex",justifyContent:"space-between",width:"100%",marginBottom:8}}>
            <div style={{fontFamily:"'Fredoka One',cursive",fontSize:13,color:"#555"}}>Word <span style={{color:"#4ade80"}}>{wsIdx+1}</span>/{wsQueue.length}</div>
            <div style={{fontFamily:"'Fredoka One',cursive",fontSize:13,color:"#555"}}>Score: <span style={{color:"#4ade80"}}>{wsScore}</span></div>
            <div style={{fontFamily:"'Fredoka One',cursive",fontSize:13,color:"#555"}}>⏱ <span style={{color:wsTcol}}>{wsTimeLeft}s{wsHint?" ⚡":""}</span></div>
          </div>
          <div style={{background:"rgba(255,255,255,0.06)",borderRadius:99,height:7,overflow:"hidden",width:"100%",marginBottom:12}}>
            <div style={{height:"100%",borderRadius:99,width:`${wsTpct}%`,background:wsTcol,transition:"width 0.85s linear"}}/>
          </div>

            <div style={{color:"#555",fontSize:11,letterSpacing:1,textTransform:"uppercase",marginBottom:12,textAlign:"center"}}>Unscramble this GenLayer word</div>

              background:wsFlash==="correct"?"rgba(74,222,128,0.07)":wsFlash==="wrong"?"rgba(248,113,113,0.07)":"rgba(255,255,255,0.02)",
              border:`2px solid ${wsFlash==="correct"?"#4ade80":wsFlash==="wrong"?"#f87171":"rgba(255,255,255,0.08)"}`,
            }}>
              {wsScrambled.split("").map((ch,i)=>(
                <span key={i} style={{width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:8,fontFamily:"'Fredoka One',cursive",fontSize:18,color:"#fff",background:wsFlash==="correct"?"#4ade80":wsFlash==="wrong"?"#f87171":COLORS[i%COLORS.length],boxShadow:"0 3px 8px rgba(0,0,0,0.3)",userSelect:"none"}}>{ch}</span>
              ))}

            {wsFlash==="correct"&&<div style={{color:"#4ade80",fontFamily:"'Fredoka One',cursive",fontSize:18,marginBottom:8,textAlign:"center"}}>✓ {wsCurrentWord.word}!</div>}

              <>
                <div style={{display:"flex",gap:8,marginBottom:10}}>
                  <input value={wsInput} onChange={e=>setWsInput(e.target.value.toUpperCase())} onKeyDown={e=>e.key==="Enter"&&submitWs()} placeholder="Type your answer..." autoFocus maxLength={20}
                    style={{flex:1,background:"rgba(255,255,255,0.05)",border:"2px solid rgba(255,255,255,0.1)",borderRadius:12,padding:"11px 14px",color:"#fff",fontSize:16,fontFamily:"'Fredoka One',cursive",letterSpacing:2,outline:"none"}}/>
                  <button onClick={submitWs} style={{padding:"11px 18px",borderRadius:12,background:"linear-gradient(135deg,#4ade80,#22c55e)",border:"none",color:"#fff",fontFamily:"'Fredoka One',cursive",fontSize:16,cursor:"pointer"}}>Go!</button>
                </div>
                {!wsHint
                  ?<button onClick={()=>{setWsHint(true);wsRef.current.hint=true;}} style={{background:"transparent",border:"1px dashed rgba(255,255,255,0.12)",borderRadius:10,padding:"7px 14px",color:"#555",cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontSize:12,width:"100%"}}>Show Hint <span style={{color:"#f87171",fontSize:10}}>⚡ 2× speed</span></button>
                  :<div style={{background:"rgba(74,222,128,0.07)",border:"1px solid rgba(74,222,128,0.2)",borderRadius:10,padding:"8px 12px",color:"#4ade80",fontSize:12,textAlign:"center"}}>💡 {wsCurrentWord.hint}</div>
                }
              </>
            )}
            {wsStreak>=2&&<div style={{color:"#facc15",fontSize:12,marginTop:8,fontFamily:"'Fredoka One',cursive",textAlign:"center"}}>🔥 {wsStreak} streak!</div>}
          </div>
          <button onClick={()=>{clearInterval(wsTimerRef.current);setScreen("menu");}} style={{...btnG,marginTop:12,maxWidth:460}}>← Menu</button>
        </div>
      )}
      {wsScr==="win"&&(
        <div style={{...card,textAlign:"center"}}>
          <div style={{fontSize:56,marginBottom:8}}>🔤</div>
          <div style={{fontFamily:"'Fredoka One',cursive",fontSize:26,color:"#4ade80",marginBottom:4}}>Scramble Complete!</div>
          <div style={{fontFamily:"'Fredoka One',cursive",fontSize:48,color:"#facc15",margin:"6px 0"}}>{wsScore} pts</div>
          <div style={{color:"#555",fontSize:12,marginBottom:20}}>{wsQueue.length} words unscrambled</div>
          <button onClick={()=>{startWordScramble();}} style={btnP("linear-gradient(135deg,#4ade80,#22c55e)")}>Play Again</button>
          <button onClick={()=>setScreen("menu")} style={btnG}>← Menu</button>
        </div>
      )}
    </div>
  )}

  {/* ── HANGMAN ── */}
  {screen==="hangman"&&(
    <div style={ctr}>
      <div style={{width:"100%",maxWidth:460,display:"flex",flexDirection:"column",alignItems:"center"}}>
        <div style={{display:"flex",justifyContent:"space-between",width:"100%",marginBottom:10}}>
          <div style={{fontFamily:"'Fredoka One',cursive",fontSize:13,color:"#555"}}>Round <span style={{color:"#facc15"}}>{hmRound+1}</span></div>
          <div style={{fontFamily:"'Fredoka One',cursive",fontSize:13,color:"#555"}}>Score: <span style={{color:"#facc15"}}>{hmScore}</span></div>
          <div style={{display:"flex",gap:3}}>{Array.from({length:HM_MAX}).map((_,i)=><span key={i} style={{opacity:i<hmWrong?1:0.2,fontSize:14}}>{i<hmWrong?"💀":"❤️"}</span>)}</div>
        </div>
        <div style={card}>
          <div style={{display:"flex",justifyContent:"center",marginBottom:10}}>
            <svg width="110" height="120" viewBox="0 0 110 120">
              <line x1="5" y1="115" x2="105" y2="115" stroke="#444" strokeWidth="3" strokeLinecap="round"/>
              <line x1="25" y1="115" x2="25" y2="5"   stroke="#444" strokeWidth="3" strokeLinecap="round"/>
              <line x1="25" y1="5"   x2="70" y2="5"   stroke="#444" strokeWidth="3" strokeLinecap="round"/>
              <line x1="70" y1="5"   x2="70" y2="22"  stroke="#444" strokeWidth="3" strokeLinecap="round"/>
              {hmWrong>=1&&<circle cx="70" cy="31" r="9"  stroke="#f87171" strokeWidth="2.5" fill="none"/>}
              {hmWrong>=2&&<line x1="70" y1="40" x2="70" y2="70" stroke="#f87171" strokeWidth="2.5" strokeLinecap="round"/>}
              {hmWrong>=3&&<line x1="70" y1="50" x2="55" y2="62" stroke="#f87171" strokeWidth="2.5" strokeLinecap="round"/>}
              {hmWrong>=4&&<line x1="70" y1="50" x2="85" y2="62" stroke="#f87171" strokeWidth="2.5" strokeLinecap="round"/>}
              {hmWrong>=5&&<line x1="70" y1="70" x2="58" y2="90" stroke="#f87171" strokeWidth="2.5" strokeLinecap="round"/>}
              {hmWrong>=6&&<line x1="70" y1="70" x2="82" y2="90" stroke="#f87171" strokeWidth="2.5" strokeLinecap="round"/>}

          <div style={{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center",marginBottom:12}}>
            {hmDisplay.map((ch,i)=>(
              <div key={i} style={{minWidth:22,textAlign:"center",borderBottom:`2px solid ${ch==="_"?"#444":"#4ade80"}`,paddingBottom:2,fontFamily:"'Fredoka One',cursive",fontSize:20,color:ch==="_"?"transparent":"#4ade80"}}>{ch||" "}</div>
            ))}
          </div>
          <div style={{fontSize:11,color:"#555",textAlign:"center",marginBottom:12,fontStyle:"italic"}}>💡 {hmWord.hint}</div>
          {hmFlash==="win"&&(
            <div style={{textAlign:"center",marginBottom:10}}>
              <div style={{fontFamily:"'Fredoka One',cursive",fontSize:18,color:"#4ade80",marginBottom:8}}>🎉 Correct! +{(HM_MAX-hmWrong)*10} pts</div>
              <button onClick={nextHmWord} style={btnP("linear-gradient(135deg,#4ade80,#22c55e)")}>Next Word →</button>
            </div>
          )}
          {hmFlash==="lose"&&(
            <div style={{textAlign:"center",marginBottom:10}}>
              <div style={{fontFamily:"'Fredoka One',cursive",fontSize:16,color:"#f87171",marginBottom:8}}>💀 The word was: <strong>{hmWord.word}</strong></div>
              <button onClick={nextHmWord} style={btnP("linear-gradient(135deg,#f87171,#ef4444)")}>Try Another →</button>
            </div>

          {!hmFlash&&(
            <div style={{display:"flex",flexWrap:"wrap",gap:5,justifyContent:"center"}}>
              {ALPHA.map(l=>{
                const used=hmGuessed.includes(l),correct=used&&hmWord.word.includes(l),wrong=used&&!hmWord.word.includes(l);
                return <button key={l} onClick={()=>guessLetter(l)} disabled={used} style={{width:30,height:30,borderRadius:7,border:`1px solid ${correct?"#4ade80":wrong?"#333":"rgba(255,255,255,0.15)"}`,background:correct?"rgba(74,222,128,0.15)":wrong?"rgba(255,255,255,0.02)":"rgba(255,255,255,0.05)",color:correct?"#4ade80":wrong?"#333":"#ccc",fontFamily:"'Fredoka One',cursive",fontSize:12,cursor:used?"default":"pointer"}}>{l}</button>;
              })}
            </div>
          )}
        </div>
        <button onClick={()=>setScreen("menu")} style={{...btnG,marginTop:12,maxWidth:460}}>← Menu</button>
      </div>
    </div>
  )}

  {/* ── WORD RACER ── */}
  {screen==="car"&&(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:16}}>
      {carScr==="game"&&(
        <div style={{width:"100%",maxWidth:480,display:"flex",flexDirection:"column",alignItems:"center"}}>
          <div style={{width:"100%",maxWidth:480,marginBottom:8,fontFamily:"'Fredoka One',cursive",fontSize:13,color:"#555",textAlign:"center"}}>
            Collect letters in order to spell the word! 🏎️
          </div>
          <div style={{position:"relative",width:"100%",maxWidth:480}}>
            <canvas ref={carCanvasRef} width="480" height="520" style={{width:"100%",height:"auto",borderRadius:16,display:"block",boxShadow:"0 8px 32px rgba(0,0,0,0.6)"}}/>
          </div>
          {/* Mobile controls */}
          <div style={{display:"flex",gap:10,marginTop:12,width:"100%",maxWidth:480}}>
            <button
              onPointerDown={()=>carGameRef.current?.moveLeft()}
              onPointerUp={()=>carGameRef.current?.stopLeft()}
              onPointerLeave={()=>carGameRef.current?.stopLeft()}
              style={{flex:1,padding:"18px 0",borderRadius:14,background:"rgba(96,165,250,0.15)",border:"2px solid rgba(96,165,250,0.3)",color:"#60a5fa",fontFamily:"'Fredoka One',cursive",fontSize:28,cursor:"pointer",userSelect:"none"}}>◀</button>
            <button onClick={()=>{stopCarGame();setScreen("menu");}} style={{flex:1,padding:"18px 0",borderRadius:14,background:"transparent",border:"1px solid rgba(255,255,255,0.1)",color:"#555",fontFamily:"'Fredoka One',cursive",fontSize:13,cursor:"pointer"}}>← Menu</button>
            <button
              onPointerDown={()=>carGameRef.current?.moveRight()}
              onPointerUp={()=>carGameRef.current?.stopRight()}
              onPointerLeave={()=>carGameRef.current?.stopRight()}
              style={{flex:1,padding:"18px 0",borderRadius:14,background:"rgba(96,165,250,0.15)",border:"2px solid rgba(96,165,250,0.3)",color:"#60a5fa",fontFamily:"'Fredoka One',cursive",fontSize:28,cursor:"pointer",userSelect:"none"}}>▶</button>
          </div>
        </div>
      )}

      {carScr==="win"&&(
        <div style={{...card,textAlign:"center"}}>
          <div style={{fontSize:56,marginBottom:8}}>🏆</div>
          <div style={{fontFamily:"'Fredoka One',cursive",fontSize:26,color:"#f87171",marginBottom:4}}>Word Complete!</div>
          <div style={{fontFamily:"'Fredoka One',cursive",fontSize:36,color:"#facc15",margin:"6px 0"}}>{carGameRef.current?.finalWord}</div>
          <div style={{fontFamily:"'Fredoka One',cursive",fontSize:44,color:"#4ade80",margin:"6px 0"}}>{carGameRef.current?.finalScore} pts</div>
          <div style={{color:"#555",fontSize:12,marginBottom:20}}>You spelled it perfectly!</div>
          <button onClick={()=>{startCarGame();}} style={btnP("linear-gradient(135deg,#f87171,#fb923c)")}>Play Again</button>
          <button onClick={()=>{setCarScr("menu");setScreen("menu");}} style={btnG}>← Menu</button>
        </div>
      )}
    </div>
  )}

  <style>{`
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap');
    @keyframes confettiFall{from{opacity:1;transform:translateY(0) rotate(0)}to{opacity:0;transform:translateY(100vh) rotate(720deg)}}
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    *{box-sizing:border-box} body{margin:0}
    button{transition:transform 0.1s} button:active{transform:scale(0.97)}
    input{-webkit-appearance:none}
  `}</style>
  </div>
</div>

);
